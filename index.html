<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Collemaggio VR</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- Movimento limitato della camera -->
  <script>
    AFRAME.registerComponent('movement-clamp', {
      schema: {
        minX: {type: 'number', default: -8},
        maxX: {type: 'number', default:  8},
        minZ: {type: 'number', default: -2},
        maxZ: {type: 'number', default:  5}
      },
      tick: function () {
        const pos = this.el.getAttribute('position');
        let x = pos.x, z = pos.z;
        let clamped = false;

        if (x < this.data.minX) { x = this.data.minX; clamped = true; }
        if (x > this.data.maxX) { x = this.data.maxX; clamped = true; }
        if (z < this.data.minZ) { z = this.data.minZ; clamped = true; }
        if (z > this.data.maxZ) { z = this.data.maxZ; clamped = true; }

        if (clamped) {
          this.el.setAttribute('position', {x: x, y: pos.y, z: z});
        }
      }
    });
  </script>
</head>

<body>
<a-scene>

  <!-- Sfondo -->
  <a-sky color="#87CEFA"></a-sky>

  <!-- Basilica -->
  <a-entity
    gltf-model="models/Basilica Collemaggio 3d.glb"
    position="0 0 0"
    scale="1 1 1">
  </a-entity>

  <!-- PRETE CLICCABILE + ANIMAZIONI -->
  <a-entity id="prete" class="cliccabile"
    gltf-model="models/prete.glb"
    position="-0.3 0.1 0"
    scale="2.5 2.5 2.5"
    rotation="0 150 0">

    <!-- AUDIO -->
    <a-sound id="audio-prete"
      src="audio/audioPrete.mp3"
      autoplay="false"
      volume="1">
    </a-sound>

    <!-- TESTA (rotazione leggera) 
    <a-animation
      attribute="rotation"
      to="0 160 0"
      direction="alternate"
      dur="300"
      repeat="indefinite"
      begin="parla"
      end="stopparla">
    </a-animation> -->

    <!-- CORPO (oscillazione) 
    <a-animation
      attribute="position"
      to="-0.3 0.12 0"
      direction="alternate"
      dur="400"
      repeat="indefinite"
      begin="parla"
      end="stopparla">
    </a-animation> -->

    <!-- BOCCA (simulata con scale) 
    <a-animation
      attribute="scale"
      to="2.5 2.4 2.5"
      direction="alternate"
      dur="150"
      repeat="indefinite"
      begin="parla"
      end="stopparla">
    </a-animation> -->  

  </a-entity>

  <!-- Luci -->
  <a-light type="ambient" intensity="1"></a-light>
  <a-light type="directional" intensity="1" position="2 4 2"></a-light>

  <!-- Piano -->
  <a-plane
    position="0 0 18"
    rotation="-90 0 0"
    width="40" height="40"
    color="#7BB369">
  </a-plane>

  <!-- Testo -->
  <a-text
    value="L'Aquila
Capitale della Cultura 2026"
    position="-2 2 8"
    rotation="0 180 0"
    align="center"
    color="#FFFFFF"
    width="10">
  </a-text>

  <!-- CAMERA VR -->
  <a-camera
    position="-2 2 4"
    movement-clamp="minX: -8; maxX: 8; minZ: -2; maxZ: 5"
    wasd-controls="acceleration: 20"
    cursor="rayOrigin: mouse"
    raycaster="objects: .cliccabile">

    <a-cursor></a-cursor>
  </a-camera>

</a-scene>
</body>

<!-- SCRIPT: audio + animazioni solo una volta -->
<script>
  AFRAME.registerComponent('talk-once', {
    init: function () {
      let played = false;

      this.el.addEventListener('click', () => {
        if (played) return;

        const sound = document.querySelector('#audio-prete');

        // Avvia audio
        sound.components.sound.playSound();

        // Avvia animazioni
        this.el.emit('parla');

        played = true;

        // Quando l’audio finisce → ferma animazioni
        sound.addEventListener('sound-ended', () => {
          this.el.emit('stopparla');
        });
      });
    }
  });

  window.addEventListener('DOMContentLoaded', () => {
    document.querySelector('#prete').setAttribute('talk-once', '');
  });
</script>

</html>
