<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Collemaggio VR</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- Componente TALK-ONCE -->
  <script>
    AFRAME.registerComponent('talk-once', {
      init: function () {
        let played = false;

        this.el.addEventListener('click', () => {
          if (played) return;

          const sound = this.el.querySelector('#audio-prete');

          if (!sound.components.sound) {
            sound.addEventListener('loaded', () => {
              sound.components.sound.playSound();
            });
          } else {
            sound.components.sound.playSound();
          }

          played = true;

          sound.addEventListener('sound-ended', () => {
            this.el.emit('stopparla');
          });
        });
      }
    });
  </script>
</head>

<body>
<a-scene vr-mode-ui="enabled: true">

  <!-- Sfondo -->
  <a-sky color="#87CEFA"></a-sky>

  <!-- Basilica -->
  <a-entity
    gltf-model="models/Basilica Collemaggio 3d.glb"
    position="0 0 0"
    scale="1 1 1">
  </a-entity>

  <!-- PRETE CLICCABILE -->
  <a-entity id="prete" class="cliccabile"
    gltf-model="models/prete.glb"
    position="-0.3 0.1 0"
    scale="2.5 2.5 2.5"
    rotation="0 150 0"
    talk-once>

    <a-sound id="audio-prete"
      src="audio/audioPrete.mp3"
      autoplay="false"
      volume="1">
    </a-sound>

  </a-entity>

  <!-- Luci -->
  <a-light type="ambient" intensity="1"></a-light>
  <a-light type="directional" intensity="1" position="2 4 2"></a-light>

  <!-- Piano -->
  <a-plane
    position="0 0 18"
    rotation="-90 0 0"
    width="40" height="40"
    color="#7BB369">
  </a-plane>

  <!-- Testo -->
  <a-text
    value="L'Aquila
Capitale della Cultura 2026"
    position="-2 2 8"
    rotation="0 180 0"
    align="center"
    color="#FFFFFF"
    width="10">
  </a-text>

  <!-- RIG VR CON MOVIMENTO A JOYSTICK -->
  <a-entity id="rig"
            movement-controls="fly: false"
            position="-2 1.6 4">

    <!-- CAMERA VR -->
    <a-entity id="camera"
              camera
              look-controls="pointerLockEnabled: true"
              wasd-controls="acceleration: 20"
              universal-controls
              gamepad-controls
              cursor="rayOrigin: mouse"
              raycaster="objects: .cliccabile">
      <a-cursor></a-cursor>
    </a-entity>

  </a-entity>

</a-scene>
</body>
</html>
